workflows:
  # Проверка сборки без подписи — запускается сразу после подключения репозитория.
  ios-ci:
    name: Restoran iOS (CI)
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: App.xcworkspace
        XCODE_SCHEME: App
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Generate icons
        script: npm run build:icons
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Build for iOS Simulator (unsigned)
        script: |
          cd ios/App
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - /tmp/xcodebuild_logs/*.log

  # Подписанный IPA. Перед запуском настройте в Codemagic:
  # Team settings → Integrations → Developer Portal → API key с именем "Restoran ASC".
  # Team settings → Code signing identities (сертификат + provisioning profile).
  ios-release:
    name: Restoran iOS (signed IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Restoran ASC
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: net.nohchi.restoran
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: net.nohchi.restoran
        XCODE_WORKSPACE: App.xcworkspace
        XCODE_SCHEME: App
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Generate icons
        script: npm run build:icons
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Apply provisioning profiles
        script: |
          cd ios/App
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

